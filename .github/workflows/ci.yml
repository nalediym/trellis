name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One CI pipeline per branch — cancel in-flight runs when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint · typecheck · validate · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate platform manifests
        run: npm run validate:manifests

      - name: Run engine smoke tests
        run: npm run test:engines

      - name: Build
        # `npm run build` re-runs validate:manifests as a prebuild step — keep
        # the explicit step above anyway so a bad manifest shows up early
        # in the CI log without the Next.js compile noise.
        run: npm run build

  deploy:
    name: deploy · App Hosting rollout (WIF — no stored keys)
    # Firebase App Hosting's native GitHub link is the primary deploy path — it
    # watches main and rolls out on push. This job is a belt-and-braces trigger
    # that kicks a rollout from CI using Workload Identity Federation, so we
    # never store a long-lived service-account key anywhere.
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # OIDC token for WIF auth — scoped narrowly to this job.
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Auth to Google Cloud (Workload Identity Federation)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/995743749820/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: github-deployer@trellis-4e361.iam.gserviceaccount.com

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      - name: Trigger App Hosting rollout
        # --force skips the confirmation prompt; --git-branch ties the rollout
        # to the latest commit on main. App Hosting pulls the source, builds,
        # and rolls out in one step.
        run: |
          firebase apphosting:rollouts:create trellis \
            --project=trellis-4e361 \
            --git-branch=main \
            --force
